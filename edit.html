<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Tam Ayrıntılı Düzenleme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');
  </style>
</head>
<body class="bg-stone-950 text-white min-h-screen p-8">

<div class="max-w-6xl mx-auto bg-white text-black rounded-3xl p-10">
  <h1 class="text-4xl font-bold text-center mb-10">🔐 Tam Ayrıntılı Admin Paneli</h1>

  <!-- Bölüm 1 -->
  <div class="mb-12 border-b pb-8">
    <h3 class="text-2xl font-semibold mb-6">1. Başlık ve İsimler Alanı</h3>
    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm mb-1">Başlık Metni</label>
        <input id="b1-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Düğün Davetiyesi">
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="block text-xs mb-1">Boyut</label><input id="b1-baslik-size" type="number" value="72" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="b1-baslik-color" type="color" value="#ffffff" class="w-full h-12 rounded-2xl border-0"></div>
        <div><label class="block text-xs mb-1">Font</label>
          <select id="b1-baslik-font" class="w-full border rounded-2xl px-4 py-3">
            <option value="Playfair Display">Playfair (Zarif)</option>
            <option value="Inter">Inter (Modern)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="mt-6">
      <label class="block text-sm mb-1">Buton Metni</label>
      <input id="b1-buton" type="text" class="w-full border rounded-2xl px-4 py-3" value="DAVETİYEYİ AÇ">
    </div>
  </div>

  <!-- Bölüm 2 -->
  <div class="mb-12 border-b pb-8">
    <h3 class="text-2xl font-semibold mb-6">2. Tarih Alanı</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Tarih Metni</label><input id="b2-tarih" type="datetime-local" class="w-full border rounded-2xl px-4 py-3"></div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="block text-xs mb-1">Boyut</label><input id="b2-tarih-size" type="number" value="48" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="b2-tarih-color" type="color" value="#fcd34d" class="w-full h-12 rounded-2xl border-0"></div>
        <div><label class="block text-xs mb-1">Font</label><select id="b2-tarih-font" class="w-full border rounded-2xl px-4 py-3"><option value="Playfair Display">Playfair</option><option value="Inter">Inter</option></select></div>
      </div>
    </div>
  </div>

  <!-- Bölüm 3 -->
  <div class="mb-12 border-b pb-8">
    <h3 class="text-2xl font-semibold mb-6">3. Aile Bilgileri Alanı</h3>
    <div class="grid grid-cols-2 gap-8">
      <div>
        <label class="block text-sm mb-2">Gelin Tarafı - Anne</label>
        <input id="b3-gelin-anne" type="text" class="w-full border rounded-2xl px-4 py-3 mb-4" value="Ayşe">
        <label class="block text-sm mb-2">Gelin Tarafı - Baba</label>
        <input id="b3-gelin-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Mehmet">
      </div>
      <div>
        <label class="block text-sm mb-2">Damat Tarafı - Anne</label>
        <input id="b3-damat-anne" type="text" class="w-full border rounded-2xl px-4 py-3 mb-4" value="Fatma">
        <label class="block text-sm mb-2">Damat Tarafı - Baba</label>
        <input id="b3-damat-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ahmet">
      </div>
    </div>
  </div>

  <!-- Bölüm 4 -->
  <div class="mb-12 border-b pb-8">
    <h3 class="text-2xl font-semibold mb-6">4. Konum Alanı</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Başlık Metni</label><input id="b4-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Nerede Buluşuyoruz?"></div>
      <div><label class="block text-sm mb-1">Adres Metni</label><input id="b4-adres" type="text" class="w-full border rounded-2xl px-4 py-3" value="AE Bilişim, Hamitler, Osmangazi, Bursa"></div>
    </div>
  </div>

  <!-- Bölüm 5 -->
  <div class="mb-12 border-b pb-8">
    <h3 class="text-2xl font-semibold mb-6">5. Geri Sayım Alanı</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Başlık Metni</label><input id="b5-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Büyük güne kalan süre"></div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="block text-xs mb-1">Boyut</label><input id="b5-size" type="number" value="36" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="b5-color" type="color" value="#fcd34d" class="w-full h-12 rounded-2xl border-0"></div>
        <div><label class="block text-xs mb-1">Font</label><select id="b5-font" class="w-full border rounded-2xl px-4 py-3"><option value="Inter">Inter</option><option value="Playfair Display">Playfair</option></select></div>
      </div>
    </div>
  </div>

  <!-- Genel Ayarlar -->
  <div>
    <h3 class="text-2xl font-semibold mb-6">Genel Ayarlar</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Arka Plan Resmi URL</label><input id="edit-bg" type="text" class="w-full border rounded-2xl px-4 py-3"></div>
      <div><label class="block text-sm mb-1">Genel Arka Plan Rengi</label><input id="edit-bgcolor" type="color" value="#1f2937" class="w-full h-12 rounded-2xl border-0"></div>
    </div>
  </div>

  <div class="flex gap-4 mt-12">
    <button onclick="saveChanges()" class="flex-1 bg-rose-600 text-white py-5 rounded-3xl text-xl font-semibold">💾 KAYDET VE GÜNCELLE</button>
    <button onclick="window.location.href='/'" class="flex-1 border border-gray-400 py-5 rounded-3xl text-xl">İptal</button>
  </div>
</div>

<script>
  const EDIT_PASSWORD = "1234";

  function loadSettings() {
    const saved = JSON.parse(localStorage.getItem('davetSettings')) || {};
    // Tüm inputları doldur
    document.getElementById('b1-baslik').value = saved.b1_baslik || "Düğün Davetiyesi";
    document.getElementById('b1-baslik-size').value = saved.b1_baslik_size || 72;
    document.getElementById('b1-baslik-color').value = saved.b1_baslik_color || "#ffffff";
    document.getElementById('b2-tarih').value = saved.b2_tarih || "2026-10-15T16:00";
    document.getElementById('b4-baslik').value = saved.b4_baslik || "Nerede Buluşuyoruz?";
    document.getElementById('b4-adres').value = saved.b4_adres || "AE Bilişim, Hamitler, Osmangazi, Bursa";
    document.getElementById('b5-baslik').value = saved.b5_baslik || "Büyük güne kalan süre";
    document.getElementById('edit-bg').value = saved.bg || "";
  }

  function saveChanges() {
    const settings = {
      b1_baslik: document.getElementById('b1-baslik').value,
      b1_baslik_size: document.getElementById('b1-baslik-size').value,
      b1_baslik_color: document.getElementById('b1-baslik-color').value,
      b2_tarih: document.getElementById('b2-tarih').value,
      b4_baslik: document.getElementById('b4-baslik').value,
      b4_adres: document.getElementById('b4-adres').value,
      b5_baslik: document.getElementById('b5-baslik').value,
      bg: document.getElementById('edit-bg').value
    };
    localStorage.setItem('davetSettings', JSON.stringify(settings));
    alert("✅ Tüm ayarlar kaydedildi! Ana sayfayı yenileyin.");
  }

  window.onload = () => {
    const pw = prompt("Admin paneli şifresi:");
    if (pw !== EDIT_PASSWORD) {
      alert("❌ Yanlış şifre!");
      window.location.href = "/";
    } else {
      loadSettings();
    }
  };
</script>
</body>
</html>
