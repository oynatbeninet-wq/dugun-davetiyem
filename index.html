<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Tam Ayrıntılı Düzenleme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');
  </style>
</head>
<body class="bg-stone-950 text-white min-h-screen p-8">

<div class="max-w-6xl mx-auto bg-white text-black rounded-3xl p-10">
  <h1 class="text-4xl font-bold text-center mb-10">🔐 Tam Ayrıntılı Admin Paneli</h1>

  <div class="flex border-b mb-8">
    <button onclick="switchTab(1)" class="tab-btn active px-6 py-4">Bölüm 1 - Başlık</button>
    <button onclick="switchTab(2)" class="tab-btn px-6 py-4">Bölüm 2 - Tarih</button>
    <button onclick="switchTab(3)" class="tab-btn px-6 py-4">Bölüm 3 - Aile</button>
    <button onclick="switchTab(4)" class="tab-btn px-6 py-4">Bölüm 4 - Konum</button>
    <button onclick="switchTab(5)" class="tab-btn px-6 py-4">Bölüm 5 - Geri Sayım</button>
    <button onclick="switchTab(6)" class="tab-btn px-6 py-4">Bölüm 6 - Müzik</button>
    <button onclick="switchTab(7)" class="tab-btn px-6 py-4">Bölüm 7 - Footer</button>
  </div>

  <!-- Bölüm 1 -->
  <div id="tab1" class="tab-content">
    <h3 class="text-xl font-bold mb-6">Bölüm 1 - Başlık ve İsimler</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Ana Başlık</label><input id="edit-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Düğün Davetiyesi"></div>
      <div><label class="block text-sm mb-1">Boyut (px)</label><input id="edit-baslik-size" type="number" value="72" class="w-full border rounded-2xl px-4 py-3"></div>
      <div><label class="block text-sm mb-1">Renk</label><input id="edit-baslik-renk" type="color" value="#ffffff" class="w-full h-12 rounded-2xl border-0"></div>
      <div><label class="block text-sm mb-1">Font</label><select id="edit-baslik-font" class="w-full border rounded-2xl px-4 py-3"><option value="Playfair Display">Playfair Display</option><option value="Inter">Inter</option></select></div>
    </div>
    <div class="grid grid-cols-2 gap-6 mt-6">
      <div><label class="block text-sm mb-1">Gelin İsmi</label><input id="edit-gelin" type="text" class="w-full border rounded-2xl px-4 py-3" value="Berna"></div>
      <div><label class="block text-sm mb-1">Damat İsmi</label><input id="edit-damat" type="text" class="w-full border rounded-2xl px-4 py-3" value="Melih"></div>
    </div>
    <div class="mt-6">
      <label class="block text-sm mb-1">Buton Yazısı</label>
      <input id="edit-btntext" type="text" class="w-full border rounded-2xl px-4 py-3" value="DAVETİYEYİ AÇ">
    </div>
  </div>

  <!-- Bölüm 2 -->
  <div id="tab2" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 2 - Tarih</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Tarih Metni</label><input id="edit-tarih" type="datetime-local" class="w-full border rounded-2xl px-4 py-3"></div>
      <div><label class="block text-sm mb-1">Boyut (px)</label><input id="edit-tarih-size" type="number" value="48" class="w-full border rounded-2xl px-4 py-3"></div>
      <div><label class="block text-sm mb-1">Renk</label><input id="edit-tarih-renk" type="color" value="#fcd34d" class="w-full h-12 rounded-2xl border-0"></div>
      <div><label class="block text-sm mb-1">Font</label><select id="edit-tarih-font" class="w-full border rounded-2xl px-4 py-3"><option value="Playfair Display">Playfair Display</option><option value="Inter">Inter</option></select></div>
    </div>
  </div>

  <!-- Bölüm 3 -->
  <div id="tab3" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 3 - Aile Bilgileri</h3>
    <div class="mb-6">
      <label class="block text-sm mb-1">Ailelerimiz Başlığı</label>
      <input id="edit-aile-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ailelerimiz">
    </div>
    <div class="grid grid-cols-2 gap-8">
      <div>
        <p class="font-medium mb-3">Gelin Tarafı</p>
        <input id="edit-gelin-anne" type="text" class="w-full border rounded-2xl px-4 py-3 mb-3" value="Ayşe">
        <input id="edit-gelin-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Mehmet">
      </div>
      <div>
        <p class="font-medium mb-3">Damat Tarafı</p>
        <input id="edit-damat-anne" type="text" class="w-full border rounded-2xl px-4 py-3 mb-3" value="Fatma">
        <input id="edit-damat-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ahmet">
      </div>
    </div>
  </div>

  <!-- Bölüm 4 -->
  <div id="tab4" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 4 - Konum</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Başlık</label><input id="edit-konum-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Nerede Buluşuyoruz?"></div>
      <div><label class="block text-sm mb-1">Adres</label><input id="edit-konum" type="text" class="w-full border rounded-2xl px-4 py-3" value="AE Bilişim, Hamitler, Osmangazi, Bursa"></div>
    </div>
  </div>

  <!-- Bölüm 5 -->
  <div id="tab5" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 5 - Geri Sayım</h3>
    <div><label class="block text-sm mb-1">Başlık Metni</label><input id="edit-countdown-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Büyük güne kalan süre"></div>
  </div>

  <!-- Bölüm 7 -->
  <div id="tab7" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 7 - Footer</h3>
    <div><label class="block text-sm mb-1">Footer İsimleri</label><input id="edit-footer-isim" type="text" class="w-full border rounded-2xl px-4 py-3" value="Berna & Melih"></div>
  </div>

  <div class="flex gap-4 mt-12">
    <button onclick="saveChanges()" class="flex-1 bg-rose-600 text-white py-5 rounded-3xl text-xl font-semibold">💾 KAYDET VE GÜNCELLE</button>
    <button onclick="window.location.href='/'" class="flex-1 border border-gray-400 py-5 rounded-3xl text-xl">İptal</button>
  </div>
</div>

<script>
  const EDIT_PASSWORD = "1234";

  function switchTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab' + n).classList.remove('hidden');
  }

  function loadSettings() {
    const saved = JSON.parse(localStorage.getItem('davetSettings')) || {};
    document.getElementById('b1-baslik').value = saved.baslik || "Düğün Davetiyesi";
    document.getElementById('b2-tarih').value = saved.tarih || "2026-10-15T16:00";
    document.getElementById('b4-baslik').value = saved.konumBaslik || "Nerede Buluşuyoruz?";
    document.getElementById('b4-adres').value = saved.konum || "AE Bilişim, Hamitler, Osmangazi, Bursa";
    document.getElementById('b5-baslik').value = saved.countdownBaslik || "Büyük güne kalan süre";
    document.getElementById('edit-footer-isim').value = saved.footerIsim || "Berna & Melih";
  }

  function saveChanges() {
    const settings = {
      baslik: document.getElementById('b1-baslik').value,
      tarih: document.getElementById('b2-tarih').value,
      konumBaslik: document.getElementById('b4-baslik').value,
      konum: document.getElementById('b4-adres').value,
      countdownBaslik: document.getElementById('b5-baslik').value,
      footerIsim: document.getElementById('edit-footer-isim').value
    };
    localStorage.setItem('davetSettings', JSON.stringify(settings));
    alert("✅ Kaydedildi! Ana sayfayı yenileyin.");
  }

  window.onload = () => {
    const pw = prompt("Admin paneli şifresi:");
    if (pw !== EDIT_PASSWORD) {
      alert("❌ Yanlış şifre!");
      window.location.href = "/";
    } else {
      loadSettings();
    }
  };
</script>
</body>
</html>
