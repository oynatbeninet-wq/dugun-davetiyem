<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Tam Ayrıntılı Düzenleme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&family=Great+Vibes&family=Dancing+Script&family=Cinzel&family=Lora&family=Montserrat:wght@400;600&display=swap');
  </style>
</head>
<body class="bg-stone-950 text-white min-h-screen p-8">

<div class="max-w-6xl mx-auto bg-white text-black rounded-3xl p-10">
  <h1 class="text-4xl font-bold text-center mb-10">🔐 Tam Ayrıntılı Admin Paneli</h1>

  <div class="flex border-b mb-8 text-sm">
    <button onclick="switchTab(1)" class="tab-btn active px-6 py-3">Bölüm 1 - Başlık</button>
    <button onclick="switchTab(2)" class="tab-btn px-6 py-3">Bölüm 2 - Tarih</button>
    <button onclick="switchTab(3)" class="tab-btn px-6 py-3">Bölüm 3 - Aile</button>
    <button onclick="switchTab(4)" class="tab-btn px-6 py-3">Bölüm 4 - Konum</button>
    <button onclick="switchTab(5)" class="tab-btn px-6 py-3">Bölüm 5 - Geri Sayım</button>
    <button onclick="switchTab(6)" class="tab-btn px-6 py-3">Bölüm 6 - Müzik</button>
    <button onclick="switchTab(7)" class="tab-btn px-6 py-3">Bölüm 7 - Footer</button>
  </div>

  <!-- TAB 1: Başlık ve İsimler -->
  <div id="tab1" class="tab-content">
    <h3 class="text-xl font-bold mb-6">Bölüm 1 - Başlık ve İsimler</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Ana Başlık</label><input id="b1-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Düğün Davetiyesi"></div>
      <div><label class="block text-sm mb-1">Boyut (px)</label><input id="b1-baslik-size" type="number" value="72" class="w-full border rounded-2xl px-4 py-3"></div>
      <div><label class="block text-sm mb-1">Renk</label><input id="b1-baslik-renk" type="color" value="#ffffff" class="w-full h-12 rounded-2xl border-0"></div>
      <div><label class="block text-sm mb-1">Font</label><select id="b1-baslik-font" class="w-full border rounded-2xl px-4 py-3"><option value="Playfair Display">Playfair Display</option><option value="Great Vibes">Great Vibes</option><option value="Dancing Script">Dancing Script</option></select></div>
    </div>
  </div>

  <!-- TAB 2: Tarih -->
  <div id="tab2" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 2 - Tarih</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Tarih Metni</label><input id="b2-tarih" type="datetime-local" class="w-full border rounded-2xl px-4 py-3"></div>
      <div><label class="block text-sm mb-1">Boyut (px)</label><input id="b2-tarih-size" type="number" value="48" class="w-full border rounded-2xl px-4 py-3"></div>
      <div><label class="block text-sm mb-1">Renk</label><input id="b2-tarih-renk" type="color" value="#fcd34d" class="w-full h-12 rounded-2xl border-0"></div>
      <div><label class="block text-sm mb-1">Font</label><select id="b2-tarih-font" class="w-full border rounded-2xl px-4 py-3"><option value="Playfair Display">Playfair Display</option><option value="Inter">Inter</option></select></div>
    </div>
  </div>

  <!-- TAB 3: Aile -->
  <div id="tab3" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 3 - Aile Bilgileri</h3>
    <!-- Gelin Tarafı -->
    <div class="mb-8">
      <p class="font-medium mb-3">Gelin Tarafı</p>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm mb-1">Anne</label><input id="b3-gelin-anne" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ayşe"></div>
        <div><label class="block text-sm mb-1">Baba</label><input id="b3-gelin-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Mehmet"></div>
      </div>
    </div>
    <!-- Damat Tarafı -->
    <div>
      <p class="font-medium mb-3">Damat Tarafı</p>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm mb-1">Anne</label><input id="b3-damat-anne" type="text" class="w-full border rounded-2xl px-4 py-3" value="Fatma"></div>
        <div><label class="block text-sm mb-1">Baba</label><input id="b3-damat-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ahmet"></div>
      </div>
    </div>
  </div>

  <!-- TAB 4: Konum -->
  <div id="tab4" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 4 - Konum</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Başlık</label><input id="b4-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Nerede Buluşuyoruz?"></div>
      <div><label class="block text-sm mb-1">Adres</label><input id="b4-adres" type="text" class="w-full border rounded-2xl px-4 py-3" value="AE Bilişim, Hamitler, Osmangazi, Bursa"></div>
    </div>
  </div>

  <!-- TAB 5: Geri Sayım -->
  <div id="tab5" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 5 - Geri Sayım</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Başlık Metni</label><input id="b5-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Büyük güne kalan süre"></div>
      <div><label class="block text-sm mb-1">Renk</label><input id="b5-renk" type="color" value="#fcd34d" class="w-full h-12 rounded-2xl border-0"></div>
    </div>
  </div>

  <!-- TAB 6: Müzik -->
  <div id="tab6" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 6 - Müzik</h3>
    <div>
      <label class="block text-sm mb-1">Müzik Etiketi</label>
      <input id="b6-muzik-label" type="text" class="w-full border rounded-2xl px-4 py-3" value="Özel şarkımız çalıyor 💕">
    </div>
  </div>

  <!-- TAB 7: Footer -->
  <div id="tab7" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 7 - Footer</h3>
    <div>
      <label class="block text-sm mb-1">Kapanış Mesajı</label>
      <input id="b7-footer-mesaj" type="text" class="w-full border rounded-2xl px-4 py-3" value="Seni aramızda görmek isteriz ❤️">
    </div>
  </div>

  <div class="flex gap-4 mt-12">
    <button onclick="saveChanges()" class="flex-1 bg-rose-600 text-white py-5 rounded-3xl text-xl font-semibold">💾 KAYDET VE GÜNCELLE</button>
    <button onclick="window.location.href='/'" class="flex-1 border border-gray-400 py-5 rounded-3xl text-xl">İptal</button>
  </div>
</div>

<script>
  const EDIT_PASSWORD = "1234";

  function switchTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab' + n).classList.remove('hidden');
  }

  function loadSettings() {
    const saved = JSON.parse(localStorage.getItem('davetSettings')) || {};
    // Tüm inputları doldur (örnek)
    document.getElementById('b1-baslik').value = saved.b1_baslik || "Düğün Davetiyesi";
    document.getElementById('b2-tarih').value = saved.b2_tarih || "2026-10-15T16:00";
    document.getElementById('b4-baslik').value = saved.b4_baslik || "Nerede Buluşuyoruz?";
    document.getElementById('b4-adres').value = saved.b4_adres || "AE Bilişim, Hamitler, Osmangazi, Bursa";
    document.getElementById('b5-baslik').value = saved.b5_baslik || "Büyük güne kalan süre";
  }

  function saveChanges() {
    const settings = {
      b1_baslik: document.getElementById('b1-baslik').value,
      b2_tarih: document.getElementById('b2-tarih').value,
      b4_baslik: document.getElementById('b4-baslik').value,
      b4_adres: document.getElementById('b4-adres').value,
      b5_baslik: document.getElementById('b5-baslik').value,
      // Diğer tüm alanlar buraya eklenebilir
    };
    localStorage.setItem('davetSettings', JSON.stringify(settings));
    alert("✅ Tüm ayarlar kaydedildi! Ana sayfayı yenileyin.");
  }

  window.onload = () => {
    const pw = prompt("Admin paneli şifresi:");
    if (pw !== EDIT_PASSWORD) {
      alert("❌ Yanlış şifre!");
      window.location.href = "/";
    } else {
      loadSettings();
    }
  };
</script>
</body>
</html>
