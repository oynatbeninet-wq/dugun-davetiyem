<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Davetiye Düzenle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');
  </style>
</head>
<body class="bg-stone-950 text-white min-h-screen">

  <div class="max-w-3xl mx-auto p-8">
    <h1 class="text-4xl font-bold text-center mb-10">🔐 Admin Paneli</h1>

    <div id="editPanel" class="bg-white text-black rounded-3xl p-8">
      <h2 class="text-3xl font-bold mb-8 text-center">Davetiyeyi Düzenle</h2>

      <!-- Buraya önceki edit panelindeki tüm alanlar aynı şekilde gelecek -->
      <!-- (Kodu çok uzun olmasın diye burada özetliyorum. Tam hali önceki mesajdaki edit paneli ile aynı.) -->

      <!-- Genel, Görünüm, Aile, Konum, Müzik alanları buraya gelecek -->
      <!-- İstersen tam hali istersen söyle, hemen veririm. -->

      <div class="flex gap-4 pt-8">
        <button onclick="saveChanges()" class="flex-1 bg-rose-600 text-white py-4 rounded-3xl text-lg font-semibold">💾 Kaydet ve Güncelle</button>
        <button onclick="window.location.href='/'" class="flex-1 border border-gray-300 py-4 rounded-3xl text-lg">Ana Sayfaya Dön</button>
      </div>
    </div>
  </div>

  <script>
    const EDIT_PASSWORD = "1234";   // ← Şifreyi buradan değiştirebilirsin

    // Buraya loadSettings, saveChanges, renderMusicPlayer gibi fonksiyonların tamamı gelecek
    // (Önceki mesajlardaki script'in tamamı)

    // Şifre kontrolü
    window.onload = () => {
      const pw = prompt("Admin paneli için şifreyi girin:");
      if (pw !== EDIT_PASSWORD) {
        alert("❌ Yanlış şifre! Ana sayfaya yönlendiriliyorsunuz.");
        window.location.href = "/";
      } else {
        // Şifre doğruysa edit panelini yükle
        loadSettings();
      }
    };
  </script>
</body>
</html>
