<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Tam Ayrıntılı Düzenleme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-stone-950 text-white min-h-screen p-8">

<div class="max-w-6xl mx-auto bg-white text-black rounded-3xl p-10">
  <h1 class="text-4xl font-bold text-center mb-10">🔐 Tam Ayrıntılı Admin Paneli</h1>

  <div class="flex border-b mb-8 text-sm font-medium">
    <button onclick="switchTab(1)" class="tab-btn active px-6 py-3">Bölüm 1</button>
    <button onclick="switchTab(2)" class="tab-btn px-6 py-3">Bölüm 2</button>
    <button onclick="switchTab(3)" class="tab-btn px-6 py-3">Bölüm 3</button>
    <button onclick="switchTab(4)" class="tab-btn px-6 py-3">Bölüm 4</button>
    <button onclick="switchTab(5)" class="tab-btn px-6 py-3">Bölüm 5</button>
    <button onclick="switchTab(7)" class="tab-btn px-6 py-3">Bölüm 7</button>
  </div>

  <!-- BÖLÜM 1 -->
  <div id="tab1" class="tab-content">
    <h3 class="text-xl font-bold mb-6">Bölüm 1 - Başlık ve İsimler</h3>
    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm mb-1">Ana Başlık</label>
        <input id="edit-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Düğün Davetiyesi">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-xs mb-1">Boyut (px)</label><input id="edit-baslik-size" type="number" value="72" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="edit-baslik-renk" type="color" value="#ffffff" class="w-full h-12 rounded-2xl border-0"></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-6 mt-6">
      <div>
        <label class="block text-sm mb-1">Gelin İsmi</label>
        <input id="edit-gelin" type="text" class="w-full border rounded-2xl px-4 py-3" value="Berna">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-xs mb-1">Boyut (px)</label><input id="edit-gelin-size" type="number" value="48" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="edit-gelin-renk" type="color" value="#ffffff" class="w-full h-12 rounded-2xl border-0"></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-6 mt-6">
      <div>
        <label class="block text-sm mb-1">Damat İsmi</label>
        <input id="edit-damat" type="text" class="w-full border rounded-2xl px-4 py-3" value="Melih">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-xs mb-1">Boyut (px)</label><input id="edit-damat-size" type="number" value="48" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="edit-damat-renk" type="color" value="#ffffff" class="w-full h-12 rounded-2xl border-0"></div>
      </div>
    </div>
    <div class="mt-6">
      <label class="block text-sm mb-1">Buton Yazısı</label>
      <input id="edit-btntext" type="text" class="w-full border rounded-2xl px-4 py-3" value="DAVETİYEYİ AÇ">
    </div>
  </div>

  <!-- BÖLÜM 2 -->
  <div id="tab2" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 2 - Tarih</h3>
    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm mb-1">"Tarih" Etiketi</label>
        <input id="edit-tarih-label" type="text" class="w-full border rounded-2xl px-4 py-3" value="Tarih">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-xs mb-1">Boyut (px)</label><input id="edit-tarih-label-size" type="number" value="20" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="edit-tarih-label-renk" type="color" value="#fde68a" class="w-full h-12 rounded-2xl border-0"></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-6 mt-6">
      <div>
        <label class="block text-sm mb-1">Tarih ve Saat Metni</label>
        <input id="edit-tarih" type="datetime-local" class="w-full border rounded-2xl px-4 py-3">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-xs mb-1">Boyut (px)</label><input id="edit-tarih-size" type="number" value="48" class="w-full border rounded-2xl px-4 py-3"></div>
        <div><label class="block text-xs mb-1">Renk</label><input id="edit-tarih-renk" type="color" value="#ffffff" class="w-full h-12 rounded-2xl border-0"></div>
      </div>
    </div>
  </div>

  <!-- BÖLÜM 3 -->
  <div id="tab3" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 3 - Aile Bilgileri</h3>
    <div class="mb-6">
      <label class="block text-sm mb-1">"Ailelerimiz" Başlığı</label>
      <input id="edit-aile-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ailelerimiz">
    </div>
    <div class="grid grid-cols-2 gap-8">
      <div>
        <label class="block text-sm mb-2">Gelin Tarafı Başlığı</label>
        <input id="edit-gelin-taraf" type="text" class="w-full border rounded-2xl px-4 py-3" value="Gelin Tarafı">
      </div>
      <div>
        <label class="block text-sm mb-2">Damat Tarafı Başlığı</label>
        <input id="edit-damat-taraf" type="text" class="w-full border rounded-2xl px-4 py-3" value="Damat Tarafı">
      </div>
    </div>
    <!-- Gelin Tarafı -->
    <div class="mt-8 grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm mb-1">Anne Etiketi</label><input id="edit-gelin-anne-label" type="text" class="w-full border rounded-2xl px-4 py-3" value="Anne">
        <label class="block text-sm mb-1 mt-4">Anne Adı</label><input id="edit-gelin-anne" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ayşe">
      </div>
      <div>
        <label class="block text-sm mb-1">Baba Etiketi</label><input id="edit-gelin-baba-label" type="text" class="w-full border rounded-2xl px-4 py-3" value="Baba">
        <label class="block text-sm mb-1 mt-4">Baba Adı</label><input id="edit-gelin-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Mehmet">
      </div>
    </div>
    <!-- Damat Tarafı -->
    <div class="mt-8 grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm mb-1">Anne Etiketi</label><input id="edit-damat-anne-label" type="text" class="w-full border rounded-2xl px-4 py-3" value="Anne">
        <label class="block text-sm mb-1 mt-4">Anne Adı</label><input id="edit-damat-anne" type="text" class="w-full border rounded-2xl px-4 py-3" value="Fatma">
      </div>
      <div>
        <label class="block text-sm mb-1">Baba Etiketi</label><input id="edit-damat-baba-label" type="text" class="w-full border rounded-2xl px-4 py-3" value="Baba">
        <label class="block text-sm mb-1 mt-4">Baba Adı</label><input id="edit-damat-baba" type="text" class="w-full border rounded-2xl px-4 py-3" value="Ahmet">
      </div>
    </div>
  </div>

  <!-- BÖLÜM 4 -->
  <div id="tab4" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 4 - Konum</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Başlık</label><input id="edit-konum-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Nerede Buluşuyoruz?"></div>
      <div><label class="block text-sm mb-1">Adres</label><input id="edit-konum" type="text" class="w-full border rounded-2xl px-4 py-3" value="AE Bilişim, Hamitler, Osmangazi, Bursa"></div>
    </div>
  </div>

  <!-- BÖLÜM 5 -->
  <div id="tab5" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 5 - Geri Sayım</h3>
    <div class="grid grid-cols-2 gap-6">
      <div><label class="block text-sm mb-1">Üst Başlık</label><input id="edit-countdown-baslik" type="text" class="w-full border rounded-2xl px-4 py-3" value="Büyük güne kalan süre"></div>
      <div><label class="block text-sm mb-1">Renk</label><input id="edit-countdown-renk" type="color" value="#fcd34d" class="w-full h-12 rounded-2xl border-0"></div>
    </div>
  </div>

  <!-- BÖLÜM 7 -->
  <div id="tab7" class="tab-content hidden">
    <h3 class="text-xl font-bold mb-6">Bölüm 7 - Footer</h3>
    <div>
      <label class="block text-sm mb-1">"Seni aramızda görmek isteriz ❤️" Mesajı</label>
      <input id="edit-footer-mesaj" type="text" class="w-full border rounded-2xl px-4 py-3" value="Seni aramızda görmek isteriz ❤️">
    </div>
    <div class="mt-6">
      <label class="block text-sm mb-1">Alt İsimler</label>
      <input id="edit-footer-isim" type="text" class="w-full border rounded-2xl px-4 py-3" value="Berna & Melih">
    </div>
  </div>

  <div class="flex gap-4 mt-12">
    <button onclick="saveChanges()" class="flex-1 bg-rose-600 text-white py-5 rounded-3xl text-xl font-semibold">💾 KAYDET VE GÜNCELLE</button>
    <button onclick="window.location.href='/'" class="flex-1 border border-gray-400 py-5 rounded-3xl text-xl">İptal</button>
  </div>
</div>

<script>
  const EDIT_PASSWORD = "1234";

  function switchTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab' + n).classList.remove('hidden');
  }

  function loadSettings() {
    const saved = JSON.parse(localStorage.getItem('davetSettings')) || {};
    document.getElementById('edit-baslik').value = saved.baslik || "Düğün Davetiyesi";
    document.getElementById('edit-gelin').value = saved.gelin || "Berna";
    document.getElementById('edit-damat').value = saved.damat || "Melih";
    document.getElementById('edit-btntext').value = saved.btntext || "DAVETİYEYİ AÇ";
    document.getElementById('edit-tarih').value = saved.tarih || "2026-10-15T16:00";
    document.getElementById('edit-aile-baslik').value = saved.aileBaslik || "Ailelerimiz";
    document.getElementById('edit-gelin-taraf').value = saved.gelinTaraf || "Gelin Tarafı";
    document.getElementById('edit-damat-taraf').value = saved.damatTaraf || "Damat Tarafı";
    document.getElementById('edit-gelin-anne').value = saved.gelinAnne || "Ayşe";
    document.getElementById('edit-gelin-baba').value = saved.gelinBaba || "Mehmet";
    document.getElementById('edit-damat-anne').value = saved.damatAnne || "Fatma";
    document.getElementById('edit-damat-baba').value = saved.damatBaba || "Ahmet";
    document.getElementById('edit-konum-baslik').value = saved.konumBaslik || "Nerede Buluşuyoruz?";
    document.getElementById('edit-konum').value = saved.konum || "AE Bilişim, Hamitler, Osmangazi, Bursa";
    document.getElementById('edit-countdown-baslik').value = saved.countdownBaslik || "Büyük güne kalan süre";
    document.getElementById('edit-footer-mesaj').value = saved.footerMesaj || "Seni aramızda görmek isteriz ❤️";
    document.getElementById('edit-footer-isim').value = saved.footerIsim || "Berna & Melih";
  }

  function saveChanges() {
    const settings = {
      baslik: document.getElementById('edit-baslik').value,
      gelin: document.getElementById('edit-gelin').value,
      damat: document.getElementById('edit-damat').value,
      btntext: document.getElementById('edit-btntext').value,
      tarih: document.getElementById('edit-tarih').value,
      aileBaslik: document.getElementById('edit-aile-baslik').value,
      gelinTaraf: document.getElementById('edit-gelin-taraf').value,
      damatTaraf: document.getElementById('edit-damat-taraf').value,
      gelinAnne: document.getElementById('edit-gelin-anne').value,
      gelinBaba: document.getElementById('edit-gelin-baba').value,
      damatAnne: document.getElementById('edit-damat-anne').value,
      damatBaba: document.getElementById('edit-damat-baba').value,
      konumBaslik: document.getElementById('edit-konum-baslik').value,
      konum: document.getElementById('edit-konum').value,
      countdownBaslik: document.getElementById('edit-countdown-baslik').value,
      footerMesaj: document.getElementById('edit-footer-mesaj').value,
      footerIsim: document.getElementById('edit-footer-isim').value
    };
    localStorage.setItem('davetSettings', JSON.stringify(settings));
    alert("✅ Tüm ayarlar kaydedildi! Ana sayfayı yenileyin.");
  }

  window.onload = () => {
    const pw = prompt("Admin paneli şifresi:");
    if (pw !== EDIT_PASSWORD) {
      alert("❌ Yanlış şifre!");
      window.location.href = "/";
    } else {
      loadSettings();
    }
  };
</script>
</body>
</html>
